serenity {
    # Donde se guardarán los resultados y el reporte final
    outputDirectory = "target/site/serenity"
    # Formatos de reporte requeridos
    reports = ["html", "json"]
    # Capturas de pantalla: puedes usar FOR_EACH_ACTION o BEFORE_AND_AFTER_EACH_STEP
    take.screenshots = FOR_EACH_ACTION
    console.colors = true
    logging = "VERBOSE"
}

webdriver {
    driver = chrome
    autodownload = true
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = [
                "headless",
                "window-size=1920,1080",
                "remote-allow-origins=*",
                "no-sandbox",
                "disable-gpu",
                "disable-dev-shm-usage",
                "incognito"
            ]
        }
    }
}

environments {
    default {
        webdriver.base.url = "https://www.saucedemo.com"
        user.name = "standard_user"
        user.password = "secret_sauce"
    }
    # Aquí puedes añadir ambientes como 'dev' o 'staging' más adelante
}